<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Pit | Pits Stop Collectibles</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/XyrishLey/Pits-Stops-Collectibles-Website/refs/heads/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .signup-container {
            max-width: 650px;
            margin: 60px auto;
            padding: 40px;
            background: rgba(0, 0, 0, 0.95);
            border-radius: 20px;
            color: white;
            border: 1px solid #e60000;
            box-shadow: 0 10px 40px rgba(230, 0, 0, 0.2);
        }

        h1 { font-family: 'Orbitron', sans-serif; text-align: center; color: #e60000; margin-bottom: 30px; letter-spacing: 2px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #aaa; text-transform: uppercase; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: #e60000; box-shadow: 0 0 5px rgba(230, 0, 0, 0.5); }

        .signup-btn {
            width: 100%;
            padding: 18px;
            background: #e60000;
            color: white;
            border: none;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .signup-btn:hover { background: #ff1a1a; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(230, 0, 0, 0.4); }

        .login-link { text-align: center; margin-top: 25px; font-size: 0.9rem; color: #888; }
        .login-link a { color: #e60000; text-decoration: none; font-weight: bold; }

        select:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="signup-container">
        <h1>CREATE ACCOUNT</h1>
        <form id="signupForm">
            <div class="form-grid">
                <div class="input-group full-width">
                    <label>Full Name</label>
                    <input type="text" id="fullname" placeholder="Juan Dela Cruz" required>
                </div>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <div class="input-group">
                    <label>Contact Number</label>
                    <input type="tel" id="contact" placeholder="09123456789" required>
                </div>
                <div class="input-group">
                    <label>Zip Code</label>
                    <input type="text" id="zipcode" placeholder="1800" required>
                </div>

                <div class="input-group full-width">
                    <label>Region</label>
                    <select id="region" required>
                        <option value="">Loading Regions...</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Province</label>
                    <select id="province" disabled required>
                        <option value="">Select Province</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>City / Municipality</label>
                    <select id="city" disabled required>
                        <option value="">Select City</option>
                    </select>
                </div>

                <div class="input-group full-width">
                    <label>Barangay</label>
                    <select id="barangay" disabled required>
                        <option value="">Select Barangay</option>
                    </select>
                </div>

                <div class="input-group full-width">
                    <label>House No. / Street / Landmark</label>
                    <textarea id="address" rows="2" placeholder="e.g. Unit 123, Pits Stop Bldg, Near the Church" required></textarea>
                </div>
            </div>

            <button type="submit" class="signup-btn">REGISTER ACCOUNT</button>
        </form>
        <div class="login-link">Member already? <a href="login.html">LOGIN HERE</a></div>
    </div>

    <script>
        const regionSelect = document.getElementById('region');
        const provinceSelect = document.getElementById('province');
        const citySelect = document.getElementById('city');
        const barangaySelect = document.getElementById('barangay');

        async function fetchData(type, code = '') {
            const response = await fetch(`https://psgc.gitlab.io/api/${type}/${code ? code + '/' : ''}${type === 'barangays' ? '' : type + '.json'}`);
            if (type === 'barangays') {
                const res = await fetch(`https://psgc.gitlab.io/api/cities-municipalities/${code}/barangays.json`);
                return await res.json();
            }
            return await response.json();
        }

        async function loadRegions() {
            const regions = await fetch('https://psgc.gitlab.io/api/regions.json').then(res => res.json());
            regionSelect.innerHTML = '<option value="">Select Region</option>';
            regions.sort((a, b) => a.name.localeCompare(b.name)).forEach(r => {
                regionSelect.innerHTML += `<option value="${r.code}" data-name="${r.name}">${r.name}</option>`;
            });
        }

        regionSelect.addEventListener('change', async () => {
            provinceSelect.disabled = true;
            citySelect.disabled = true;
            barangaySelect.disabled = true;
            
            const provinces = await fetch(`https://psgc.gitlab.io/api/regions/${regionSelect.value}/provinces.json`).then(res => res.json());
            provinceSelect.innerHTML = '<option value="">Select Province</option>';
            
            if (provinces.length === 0) {
                const districts = await fetch(`https://psgc.gitlab.io/api/regions/${regionSelect.value}/districts.json`).then(res => res.json());
                districts.forEach(d => provinceSelect.innerHTML += `<option value="${d.code}" data-name="${d.name}">${d.name}</option>`);
            } else {
                provinces.forEach(p => provinceSelect.innerHTML += `<option value="${p.code}" data-name="${p.name}">${p.name}</option>`);
            }
            provinceSelect.disabled = false;
        });

        provinceSelect.addEventListener('change', async () => {
            citySelect.disabled = true;
            barangaySelect.disabled = true;
            
            const cities = await fetch(`https://psgc.gitlab.io/api/provinces/${provinceSelect.value}/cities-municipalities.json`).then(res => res.json());
            citySelect.innerHTML = '<option value="">Select City</option>';
            cities.sort((a, b) => a.name.localeCompare(b.name)).forEach(c => {
                citySelect.innerHTML += `<option value="${c.code}" data-name="${c.name}">${c.name}</option>`;
            });
            citySelect.disabled = false;
        });

        citySelect.addEventListener('change', async () => {
            barangaySelect.disabled = true;
            const barangays = await fetch(`https://psgc.gitlab.io/api/cities-municipalities/${citySelect.value}/barangays.json`).then(res => res.json());
            barangaySelect.innerHTML = '<option value="">Select Barangay</option>';
            barangays.sort((a, b) => a.name.localeCompare(b.name)).forEach(b => {
                barangaySelect.innerHTML += `<option value="${b.code}" data-name="${b.name}">${b.name}</option>`;
            });
            barangaySelect.disabled = false;
        });

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const userData = {
                fullname: document.getElementById('fullname').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                contact: document.getElementById('contact').value,
                zipcode: document.getElementById('zipcode').value,
                region: regionSelect.options[regionSelect.selectedIndex].getAttribute('data-name'),
                province: provinceSelect.options[provinceSelect.selectedIndex].getAttribute('data-name'),
                city: citySelect.options[citySelect.selectedIndex].getAttribute('data-name'),
                barangay: barangaySelect.options[barangaySelect.selectedIndex].getAttribute('data-name'),
                address: document.getElementById('address').value
            };
            localStorage.setItem('user', JSON.stringify(userData));
            alert("Account created for " + userData.fullname + "! Please login.");
            window.location.href = 'login.html';
        });

        loadRegions();
    </script>
</body>
</html>
