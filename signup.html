<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Pit | Pits Stop Collectibles</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/XyrishLey/Pits-Stops-Collectibles-Website/refs/heads/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .signup-container {
            max-width: 500px;
            margin: 60px auto;
            padding: 40px;
            background: rgba(0, 0, 0, 0.95);
            border-radius: 20px;
            color: white;
            border: 1px solid #e60000;
            box-shadow: 0 10px 40px rgba(230, 0, 0, 0.2);
        }

        h1 { font-family: 'Orbitron', sans-serif; text-align: center; color: #e60000; margin-bottom: 30px; letter-spacing: 2px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #aaa; text-transform: uppercase; }
        
        input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

        input:focus { border-color: #e60000; box-shadow: 0 0 5px rgba(230, 0, 0, 0.5); }

        .signup-btn {
            width: 100%;
            padding: 18px;
            background: #e60000;
            color: white;
            border: none;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .signup-btn:hover { background: #ff1a1a; transform: translateY(-2px); }

        .login-link { text-align: center; margin-top: 25px; font-size: 0.9rem; color: #888; }
        .login-link a { color: #e60000; text-decoration: none; font-weight: bold; }

        #password-strength { height: 5px; width: 0%; transition: 0.3s; margin-top: 5px; border-radius: 5px; }
        #strength-text { font-size: 12px; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="signup-container">
        <h1>CREATE ACCOUNT</h1>
        <form id="signupForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="fullname" placeholder="e.g. Juan Dela Cruz" required>
            </div>
            
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="juan@example.com" required>
            </div>

            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" required>
            </div>

            <div class="input-group">
                <label>Contact Number</label>
                <input type="tel" id="contact" placeholder="09123456789" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required>
                <div id="password-strength"></div>
                <span id="strength-text"></span>
            </div>

            <button type="submit" class="signup-btn">REGISTER ACCOUNT</button>
        </form>
        <div class="login-link">Member already? <a href="login.html">LOGIN HERE</a></div>
    </div>

    <script>
        const fullNameInput = document.getElementById('fullname');
        const contactInput = document.getElementById('contact');
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('password-strength');
        const strengthText = document.getElementById('strength-text');

        fullNameInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^a-zA-Z\s]/g, "");
        });

        contactInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, "");
            if (value.length > 11) value = value.slice(0, 11);
            e.target.value = value;
        });

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            let strength = 0;
            if (val.length >= 8) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            if (val === "") {
                strengthBar.style.width = "0";
                strengthText.innerText = "";
            } else if (strength <= 2) {
                strengthBar.style.width = "33%";
                strengthBar.style.backgroundColor = "#ff4d4d";
                strengthText.innerText = "Weak";
                strengthText.style.color = "#ff4d4d";
            } else if (strength === 3) {
                strengthBar.style.width = "66%";
                strengthBar.style.backgroundColor = "#ffd93d";
                strengthText.innerText = "Medium";
                strengthText.style.color = "#ffd93d";
            } else {
                strengthBar.style.width = "100%";
                strengthBar.style.backgroundColor = "#6bc167";
                strengthText.innerText = "Strong";
                strengthText.style.color = "#6bc167";
            }
        });

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const nameValue = fullNameInput.value;
            const contactValue = contactInput.value;
            const passValue = passwordInput.value;
            
            if (!/^09\d{9}$/.test(contactValue)) {
                alert("Please enter a valid 11-digit PH mobile number starting with 09.");
                return;
            }

            if (passValue.length < 8 || !/[A-Z]/.test(passValue) || !/[0-9]/.test(passValue) || !/[^A-Za-z0-9]/.test(passValue)) {
                alert("Password must be 8+ characters with an uppercase letter, a number, and a symbol.");
                return;
            }

            const userData = {
                fullname: nameValue,
                email: document.getElementById('email').value,
                username: document.getElementById('username').value,
                password: passValue,
                contact: contactValue
            };

            let users = JSON.parse(localStorage.getItem('allUsers')) || [];
            
            const userExists = users.some(u => u.username === userData.username || u.email === userData.email);
            if (userExists) {
                alert("Username or Email already taken!");
                return;
            }

            users.push(userData);
            localStorage.setItem('allUsers', JSON.stringify(users));
            
            alert("Welcome! Account created successfully.");
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
