<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Success | Pits Stop</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .success-container { border: 2px solid #e60000; padding: 50px; border-radius: 20px; box-shadow: 0 0 30px rgba(230, 0, 0, 0.4); }
        .progress-bar { width: 100%; height: 10px; background: #222; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: #e60000; transition: width 2s ease-in-out; }
        .tracking-num { color: #888; font-family: monospace; font-size: 1.2rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="success-container">
        <h1 style="color: #e60000;">ORDER PLACED!</h1>
        <p>Processing your collectibles...</p>
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        <p class="tracking-num">TRACKING: PITS-88-SKYLNE</p>
        <button onclick="window.location.href='index.html'" style="margin-top:20px; padding:10px 20px; background:none; border:1px solid white; color:white; cursor:pointer;">Back to Home</button>
    </div>
    <script>
        setTimeout(() => { document.getElementById('fill').style.width = '100%'; }, 500);
    </script>
</body>
</html>
