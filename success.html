<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success | Pits Stop</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0a0a0a; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        .success-container { 
            background: #151515;
            padding: 60px; 
            border-radius: 15px; 
            box-shadow: 0 0 40px rgba(230, 0, 0, 0.3); 
            border: 1px solid #333;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 { 
            font-family: 'Orbitron', sans-serif;
            color: #e60000; 
            font-size: 2rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        #status-text {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-bar { 
            width: 100%; 
            height: 6px; 
            background: #222; 
            border-radius: 10px; 
            margin: 20px 0; 
            overflow: hidden; 
        }

        .progress-fill { 
            height: 100%; 
            width: 0%; 
            background: #e60000; 
            box-shadow: 0 0 15px #e60000;
            transition: width 2.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .tracking-num { 
            background: #222;
            padding: 10px;
            border-radius: 5px;
            color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            font-size: 0.9rem; 
            margin: 25px 0;
            border: 1px dashed #444;
        }

        .home-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #e60000;
            color: white;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            border-radius: 5px;
            transition: 0.3s;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }

        .home-btn.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .home-btn:hover {
            background: #ff1a1a;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        #check-mark {
            display: none;
            font-size: 3rem;
            color: #00ff00;
            margin-bottom: 20px;
            animation: pop 0.4s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div id="check-mark">✓</div>
        <h1 id="main-title">ORDER PLACED!</h1>
        <p id="status-text">Processing your collectibles...</p>
        
        <div class="progress-bar">
            <div class="progress-fill" id="fill"></div>
        </div>

        <div class="tracking-num">
            <span style="color: #666;">TRACKING:</span> PITS-88-SKYLNE
        </div>

        <a href="index.html" class="home-btn" id="home-btn">BACK TO HOME</a>
    </div>

    <script>
        window.onload = function() {
            const fill = document.getElementById('fill');
            const status = document.getElementById('status-text');
            const title = document.getElementById('main-title');
            const btn = document.getElementById('home-btn');
            const check = document.getElementById('check-mark');

            setTimeout(() => { 
                fill.style.width = '100%'; 
            }, 100);

            setTimeout(() => {
                status.innerText = "Order Confirmed & Ready for Shipping";
                status.style.color = "#00ff00";
                title.innerText = "SUCCESS!";
                check.style.display = "block";
                btn.classList.add('show');
            }, 2600);
        };
    </script>
</body>
</html>
