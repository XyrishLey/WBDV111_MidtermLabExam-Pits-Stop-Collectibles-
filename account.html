<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | Pits Stop Collectibles</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/XyrishLey/Pits-Stops-Collectibles-Website/refs/heads/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; }
        .account-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 40px;
            background: rgba(20, 20, 20, 0.95);
            border-radius: 20px;
            border: 1px solid #e60000;
            box-shadow: 0 0 30px rgba(230, 0, 0, 0.2);
        }
        h1 { font-family: 'Orbitron', sans-serif; color: #e60000; text-align: center; margin-bottom: 30px; }
        
        .info-card { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid #e60000; }
        .info-label { font-size: 0.75rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        
        .edit-input {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 4px;
            font-size: 1rem;
            display: none;
            margin-top: 5px;
        }
        .info-value { font-size: 1.1rem; font-weight: bold; }

        /* Password Strength UI */
        #strength-container { display: none; margin-top: 10px; }
        #password-strength { height: 5px; width: 0%; transition: 0.3s; border-radius: 5px; }
        #strength-text { font-size: 12px; display: block; margin-top: 5px; }

        .actions { display: flex; gap: 10px; margin-top: 30px; }
        .btn { flex: 1; padding: 12px; border-radius: 5px; font-family: 'Orbitron', sans-serif; cursor: pointer; border: none; transition: 0.3s; text-decoration: none; text-align: center; color: white; }
        
        #editBtn { background: #333; }
        #saveBtn { background: #28a745; display: none; } 
        .btn-logout { background: #e60000; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="account-container">
        <h1>YOUR PROFILE</h1>
        
        <form id="profileForm">
            <div class="info-card">
                <div class="info-label">Full Name</div>
                <div class="info-value" id="val-fullname"></div>
                <input type="text" id="edit-fullname" class="edit-input" required>
            </div>

            <div class="info-card">
                <div class="info-label">Username</div>
                <div class="info-value" id="val-username"></div>
                <input type="text" id="edit-username" class="edit-input" required>
            </div>

            <div class="info-card">
                <div class="info-label">Email Address</div>
                <div class="info-value" id="val-email"></div>
                <input type="email" id="edit-email" class="edit-input" required>
            </div>

            <div class="info-card">
                <div class="info-label">Contact Number</div>
                <div class="info-value" id="val-contact"></div>
                <input type="tel" id="edit-contact" class="edit-input" placeholder="09123456789" required>
            </div>

            <div class="info-card">
                <div class="info-label">Password</div>
                <div class="info-value">••••••••</div>
                <input type="password" id="edit-password" class="edit-input" placeholder="Enter new password">
                <div id="strength-container">
                    <div id="password-strength"></div>
                    <span id="strength-text"></span>
                </div>
            </div>

            <div class="actions">
                <button type="button" id="editBtn" class="btn" onclick="toggleEdit()">EDIT INFO</button>
                <button type="submit" id="saveBtn" class="btn">SAVE CHANGES</button>
                <button type="button" onclick="logout()" class="btn btn-logout">LOGOUT</button>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <a href="index.html" style="color: #888; text-decoration: none; font-size: 0.8rem;">← Return to Home</a>
            </div>
        </form>
    </div>

    <script>
        let currentUser = JSON.parse(localStorage.getItem("currentUser"));
        const editPass = document.getElementById('edit-password');
        const strengthBar = document.getElementById('password-strength');
        const strengthText = document.getElementById('strength-text');

        function loadData() {
            if (!localStorage.getItem("loggedIn") || !currentUser) {
                window.location.href = "login.html";
                return;
            }
            document.getElementById('val-fullname').innerText = currentUser.fullname;
            document.getElementById('val-username').innerText = currentUser.username;
            document.getElementById('val-email').innerText = currentUser.email;
            document.getElementById('val-contact').innerText = currentUser.contact;

            document.getElementById('edit-fullname').value = currentUser.fullname;
            document.getElementById('edit-username').value = currentUser.username;
            document.getElementById('edit-email').value = currentUser.email;
            document.getElementById('edit-contact').value = currentUser.contact;
            editPass.value = currentUser.password;
        }

        // Input Restrictions
        document.getElementById('edit-fullname').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^a-zA-Z\s]/g, "");
        });

        document.getElementById('edit-contact').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, "");
            if (value.length > 11) value = value.slice(0, 11);
            e.target.value = value;
        });

        editPass.addEventListener('input', () => {
            const val = editPass.value;
            let strength = 0;
            if (val.length >= 8) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            if (val === "") {
                strengthBar.style.width = "0";
                strengthText.innerText = "";
            } else if (strength <= 2) {
                strengthBar.style.width = "33%";
                strengthBar.style.backgroundColor = "#ff4d4d";
                strengthText.innerText = "Weak";
                strengthText.style.color = "#ff4d4d";
            } else if (strength === 3) {
                strengthBar.style.width = "66%";
                strengthBar.style.backgroundColor = "#ffd93d";
                strengthText.innerText = "Medium";
                strengthText.style.color = "#ffd93d";
            } else {
                strengthBar.style.width = "100%";
                strengthBar.style.backgroundColor = "#6bc167";
                strengthText.innerText = "Strong";
                strengthText.style.color = "#6bc167";
            }
        });

        function toggleEdit() {
            const isEditing = document.getElementById('saveBtn').style.display === 'block';
            document.querySelectorAll('.info-value').forEach(el => el.style.display = isEditing ? 'block' : 'none');
            document.querySelectorAll('.edit-input').forEach(el => el.style.display = isEditing ? 'none' : 'block');
            document.getElementById('strength-container').style.display = isEditing ? 'none' : 'block';
            document.getElementById('saveBtn').style.display = isEditing ? 'none' : 'block';
            document.getElementById('editBtn').innerText = isEditing ? 'EDIT INFO' : 'CANCEL';
        }

        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const contactValue = document.getElementById('edit-contact').value;
            const passValue = editPass.value;

            // Strict Validation
            if (!/^09\d{9}$/.test(contactValue)) {
                alert("Contact number must be 11 digits and start with 09.");
                return;
            }

            if (passValue.length < 8 || !/[A-Z]/.test(passValue) || !/[0-9]/.test(passValue) || !/[^A-Za-z0-9]/.test(passValue)) {
                alert("Password too weak! Must be 8+ characters with Uppercase, Number, and Symbol.");
                return;
            }

            const updatedUser = {
                fullname: document.getElementById('edit-fullname').value,
                username: document.getElementById('edit-username').value,
                email: document.getElementById('edit-email').value,
                contact: contactValue,
                password: passValue
            };

            let allUsers = JSON.parse(localStorage.getItem('allUsers')) || [];
            const userIndex = allUsers.findIndex(u => u.username === currentUser.username);
            
            if (userIndex !== -1) {
                allUsers[userIndex] = updatedUser;
                localStorage.setItem('allUsers', JSON.stringify(allUsers));
            }

            localStorage.setItem('currentUser', JSON.stringify(updatedUser));
            currentUser = updatedUser;

            alert("Profile updated!");
            toggleEdit();
            loadData();
        });

        function logout() {
            localStorage.removeItem("loggedIn");
            localStorage.removeItem("currentUser");
            window.location.href = "index.html";
        }

        document.addEventListener("DOMContentLoaded", loadData);
    </script>
</body>
</html>
