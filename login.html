<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Pits Stop Collectibles</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/XyrishLey/Pits-Stops-Collectibles-Website/refs/heads/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 20px;
            color: white;
            border: 1px solid #e60000;
            box-shadow: 0 10px 30px rgba(230, 0, 0, 0.2);
            text-align: center;
        }

        .login-container h1 {
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 30px;
            color: #e60000;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #333;
            background: #111;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #e60000;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #e60000;
            color: white;
            border: none;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .login-btn:hover {
            background: #ff1a1a;
            transform: translateY(-2px);
        }

        .signup-link {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #333;
            font-family: 'Inter', sans-serif;
            color: #ccc;
        }

        .signup-link a {
            color: #e60000;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>LOGIN</h1>
        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" required autocomplete="username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn">ENTER </button>
        </form>

        <div class="signup-link">
            <p>Don't have an account yet?</p>
            <a href="signup.html">CREATE ACCOUNT</a>
        </div>
    </div>

    <script>
    // SECURITY: Clear session data when landing on login page
    // This prevents "back-button" leftovers from causing issues.
    window.onload = function() {
        localStorage.removeItem('isAdmin');
        localStorage.removeItem('loggedIn');
    };

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const userIn = document.getElementById('username').value.trim();
        const passIn = document.getElementById('password').value;

        // 1. ADMIN CHECK
        if (userIn === "admin" && passIn === "admin123") {
            localStorage.setItem('isAdmin', 'true');
            const adminData = { fullname: "System Admin", username: "admin" };
            localStorage.setItem('currentUser', JSON.stringify(adminData));
            
            alert("Access Granted: Admin Dashboard");
            // Use replace() so they can't "back" into the login form easily
            window.location.replace('admin.html');
            return; 
        }

        // 2. REGULAR USER CHECK
        const users = JSON.parse(localStorage.getItem('allUsers')) || [];
        const foundUser = users.find(u => u.username === userIn && u.password === passIn);

        if (foundUser) {
            localStorage.setItem('loggedIn', 'true');
            localStorage.setItem('isAdmin', 'false');
            localStorage.setItem('currentUser', JSON.stringify(foundUser));
            localStorage.setItem('user', JSON.stringify(foundUser)); 

            alert("Welcome back, " + foundUser.fullname + "!");
            window.location.replace('index.html');
        } else {
            alert("Invalid username or password.");
        }
    });
</script>
</body>
</html>
