        .wishlist-btn:hover {
            background: #e60000;
            border-color: #e60000;
        }

        @media (max-width: 1024px) {
            .products { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .products { grid-template-columns: 1fr; }
        }
    </style>

    <script src="script.js"></script>
    <script>
        function toggleMenu() {
            document.querySelector('.nav-menu').classList.toggle('active');
        }

        function goToDetails(name, price, img) {
            window.location.href = `product-details.html?name=${encodeURIComponent(name)}&price=${price}&img=${encodeURIComponent(img)}`;
        }

        function addToWishlist(name, price, img) {
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            const exists = wishlist.find(item => item.name === name);
            
            if (!exists) {
                wishlist.push({ name, price, img });
                localStorage.setItem('wishlist', JSON.stringify(wishlist));
                alert(`${name} added to your wishlist!`);
            } else {
                alert("This car is already in your wishlist.");
            }
        }

        document.getElementById('sort-select').addEventListener('change', function() {
            const grid = document.getElementById('product-grid');
            const cards = Array.from(grid.querySelectorAll('.product-card'));
            const val = this.value;

            if (val === 'default') return;

            cards.sort((a, b) => {
                const priceA = parseInt(a.getAttribute('data-price'));
                const priceB = parseInt(b.getAttribute('data-price'));
                return val === 'low' ? priceA - priceB : priceB - priceA;
            });

            cards.forEach(card => grid.appendChild(card));
        });
    </script>
