<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotwheels | Pit Stops Collectibles</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/XyrishLey/Pits-Stops-Collectibles-Website/refs/heads/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- GLOBAL RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0a0a0a;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                              url('https://raw.githubusercontent.com/XyrishLey/Pits-Stops-Collectibles-Website/refs/heads/main/cover%20photo.jpg');
            background-attachment: fixed;
            background-size: cover;
            color: white;
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        header {
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            border-bottom: 3px solid #e60000;
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 10px 0;
        }

        .nav-bar {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .nav-logo {
            text-decoration: none;
        }

        .nav-logo h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            line-height: 1.2;
            color: white;
            letter-spacing: 1px;
        }

        .search-container {
            flex: 0 1 400px;
            margin: 0 20px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 4px;
            border: 1px solid #333;
            background: #111;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .search-container input:focus {
            border-color: #e60000;
            box-shadow: 0 0 10px rgba(230, 0, 0, 0.3);
        }

        .menu-toggle {
            font-size: 2rem;
            color: #e60000;
            cursor: pointer;
            display: block;
        }

        /* --- SIDEBAR MENU --- */
        .nav-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 300px;
            height: 100vh;
            background: #000;
            border-left: 3px solid #e60000;
            display: flex;
            flex-direction: column;
            padding: 80px 30px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            list-style: none;
            z-index: 999;
        }

        .nav-menu.active { right: 0; }

        .nav-button {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: white;
            text-decoration: none;
            padding: 15px 0;
            border-bottom: 1px solid #222;
            display: block;
            transition: 0.3s;
        }

        .nav-button:hover {
            color: #e60000;
            padding-left: 10px;
        }

        /* --- FILTERS --- */
        .filter-section {
            max-width: 1400px;
            margin: 30px auto 0;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .filter-section label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        #sort-select {
            padding: 8px 12px;
            background: #111;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }

        #sort-select:focus { border-color: #e60000; }

        /* --- PRODUCT GRID --- */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .product-card {
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            border-color: #e60000;
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .img-container {
            position: relative;
            background: #fff; /* Card art pop */
            padding: 10px;
            border-radius: 8px;
            overflow: hidden;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: 0.3s;
        }

        .sold-out-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e60000;
            color: white;
            padding: 5px 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            font-weight: bold;
            z-index: 2;
        }

        .product-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            margin: 20px 0 5px;
            min-height: 2.4em;
        }

        .product-card p {
            color: #e60000;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .wishlist-btn {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            flex: 0 0 50px;
            transition: 0.3s;
        }

        .wishlist-btn:hover { background: #e60000; border-color: #e60000; }

        .buy-btn, .notify-btn {
            flex-grow: 1;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            padding: 12px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .buy-btn { background: #e60000; color: white; }
        .buy-btn:hover { background: #ff0000; box-shadow: 0 0 15px rgba(230,0,0,0.4); }

        .notify-btn { background: #444; color: white; }
        .notify-btn:hover { background: #666; }

        /* --- RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .search-container { display: none; }
            .nav-logo h2 { font-size: 0.7rem; }
            .products { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        }
    </style>
</head>
<body>
    <header>
        <nav class="nav-bar">
            <a href="index.html" class="nav-logo">
                <h2>PITS STOPS<br>COLLECTIBLES</h2>
            </a>
            
            <div class="search-container">
                <input type="text" id="site-search" placeholder="Search for your next car..." onkeyup="handleSearch(event)">
            </div>

            <div class="menu-toggle" onclick="toggleMenu()">☰</div>

            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-button">HOME</a></li>
                <li><a href="hotwheels.html" class="nav-button">HOTWHEELS</a></li>
                <li><a href="premium.html" class="nav-button">PREMIUM</a></li>
                <li><a href="matchbox.html" class="nav-button">MATCHBOX</a></li>
                <li><a href="notif.html" class="nav-button">🔔 ALERTS</a></li>
                <li><a href="wishlist.html" class="nav-button">❤️ WISHLIST</a></li>
                <li><a href="cart.html" class="nav-button">🛒 CART</a></li>
                <li><a href="contactUs.html" class="nav-button">Contact Us</a></li>
                <li><a href="aboutUs.html" class="nav-button">About Us</a></li>
                <li id="authSection" style="padding: 15px; font-family: 'Orbitron'; color: #e60000; border-top: 1px solid #222;"></li>
            </ul>
        </nav>
    </header>

    <div class="filter-section">
        <label>SORT BY PRICE:</label>
        <select id="sort-select" onchange="handleSort()">
            <option value="default">Default</option>
            <option value="low">Low to High</option>
            <option value="high">High to Low</option>
        </select>
    </div>

    <section class="products" id="product-grid"></section>

    <script>
        function toggleMenu() {
            document.getElementById('navMenu').classList.toggle('active');
        }

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('navMenu');
            const toggle = document.querySelector('.menu-toggle');
            if (!menu.contains(e.target) && !toggle.contains(e.target)) {
                menu.classList.remove('active');
            }
        });

        function notifyMe(prodName) {
            alert("🏁 RESTOCK REQUESTED!\n\nWe will notify you once " + prodName + " is back in stock.");
        }

        function addToWishlist(name, price, img) {
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            if (!wishlist.find(item => item.name === name)) {
                wishlist.push({ name, price, img });
                localStorage.setItem('wishlist', JSON.stringify(wishlist));
                alert("❤️ Added to your collection!");
            } else { alert("Already in your wishlist."); }
        }
        function seedInitialData() {
    const starterCars = [
        { id: 101, name: "Barbie Dream Camper", price: "220", category: "hotwheels", image: "https://raw.githubusercontent.com/XyrishLey/WBDV111_MidtermLabExam-Pits-Stop-Collectibles-/refs/heads/main/IMAGES/HOTWHEELS/BARBIE%20DREAM%20CAMPER.jpg", quantity: 5 },
        { id: 102, name: "Honda Civic EF", price: "250", category: "hotwheels", image: "https://raw.githubusercontent.com/XyrishLey/WBDV111_MidtermLabExam-Pits-Stop-Collectibles-/refs/heads/main/IMAGES/HOTWHEELS/HONDA%20CIVIC%20EF.jpg", quantity: 0 },
        { id: 103, name: "2018 Honda Civic Type R", price: "200", category: "hotwheels", image: "https://raw.githubusercontent.com/XyrishLey/WBDV111_MidtermLabExam-Pits-Stop-Collectibles-/refs/heads/main/IMAGES/HOTWHEELS/2018%20type%20r.jpg", quantity: 12 },
        { id: 104, name: "Nissan Skyline R33", price: "199", category: "hotwheels", image: "https://raw.githubusercontent.com/XyrishLey/WBDV111_MidtermLabExam-Pits-Stop-Collectibles-/refs/heads/main/IMAGES/HOTWHEELS/skyline%202.jpg", quantity: 5 },
        { id: 110, name: "'20 Toyota GR Supra", price: "320", category: "hotwheels", image: "https://raw.githubusercontent.com/XyrishLey/WBDV111_MidtermLabExam-Pits-Stop-Collectibles-/main/IMAGES/HOTWHEELS/%2720TOYOTA_GR_SUPRA_320.jpg", quantity: 10 },
        { id: 111, name: "'47 Chevy Fleetline", price: "180", category: "hotwheels", image: "https://raw.githubusercontent.com/XyrishLey/WBDV111_MidtermLabExam-Pits-Stop-Collectibles-/main/IMAGES/HOTWHEELS/%2747_CHEVY_FLEETLINE_180.jpg", quantity: 5 },
        { id: 112, name: "McMurtry Spéirling", price: "250", category: "hotwheels", image: "https://raw.githubusercontent.com/XyrishLey/WBDV111_MidtermLabExam-Pits-Stop-Collectibles-/refs/heads/main/IMAGES/HOTWHEELS/mcmurty.jpg", quantity: 3 },
        { id: 113, name: "2016 Ford GT Race", price: "180", category: "hotwheels", image: "https://raw.githubusercontent.com/XyrishLey/WBDV111_MidtermLabExam-Pits-Stop-Collectibles-/refs/heads/main/IMAGES/HOTWHEELS/2016_FORD_GT_RACE_180.jpg", quantity: 7 },
        { id: 114, name: "Mazda REPU", price: "180", category: "hotwheels", image: "https://raw.githubusercontent.com/XyrishLey/WBDV111_MidtermLabExam-Pits-Stop-Collectibles-/refs/heads/main/IMAGES/HOTWHEELS/MAZDA_REPU_180.jpg", quantity: 4 },
        { id: 115, name: "'67 Mustang", price: "180", category: "hotwheels", image: "https://raw.githubusercontent.com/XyrishLey/WBDV111_MidtermLabExam-Pits-Stop-Collectibles-/main/IMAGES/HOTWHEELS/%2767_MUSTANG_180.jpg", quantity: 6 },
        { id: 116, name: "Peugeot 9X8 Hypercar", price: "180", category: "hotwheels", image: "https://raw.githubusercontent.com/XyrishLey/WBDV111_MidtermLabExam-Pits-Stop-Collectibles-/refs/heads/main/IMAGES/HOTWHEELS/PEUGEOT_9X8_HYPERCAR.HYPERVOITURE_180.jpg", quantity: 2 }
    ];

    let products = JSON.parse(localStorage.getItem('allProducts')) || [];
    let updated = false;

    starterCars.forEach(car => {
        // Only add the car if its ID doesn't exist in LocalStorage yet
        if (!products.some(p => p.id === car.id)) {
            products.push(car);
            updated = true;
        }
    });

    if (updated) {
        localStorage.setItem('allProducts', JSON.stringify(products));
        window.location.reload();
    }
}

        function loadDynamicProducts() {
            const grid = document.getElementById('product-grid');
            const allProducts = JSON.parse(localStorage.getItem('allProducts')) || [];
            const hotwheelsProducts = allProducts.filter(p => p.category === 'hotwheels');

            grid.innerHTML = ""; 

            hotwheelsProducts.forEach(p => {
                const isSoldOut = (parseInt(p.quantity) <= 0);
                const productDiv = document.createElement('div');
                productDiv.className = 'product-card';
                productDiv.innerHTML = `
                    <div class="img-container">
                        <img src="${p.image}" style="${isSoldOut ? 'filter: grayscale(1); opacity: 0.5;' : ''}">
                        ${isSoldOut ? '<div class="sold-out-badge">SOLD OUT</div>' : ''}
                    </div>
                    <h3>${p.name}</h3>
                    <p>₱${p.price}</p>
                    <div class="card-actions">
                        <button class="wishlist-btn" onclick="addToWishlist('${p.name}', ${p.price}, '${p.image}')">❤</button>
                        ${isSoldOut ? 
                            `<button class="notify-btn" onclick="notifyMe('${p.name}')">Notify me</button>` : 
                            `<button class="buy-btn" onclick="window.location.href='product-details.html?name=${encodeURIComponent(p.name)}&price=${p.price}&img=${encodeURIComponent(p.image)}'">BUY NOW</button>`
                        }
                    </div>`;
                grid.appendChild(productDiv);
            });
        }

        window.onload = function() { 
            seedInitialData(); 
            loadDynamicProducts(); 
        };
    </script>
</body>
</html>
