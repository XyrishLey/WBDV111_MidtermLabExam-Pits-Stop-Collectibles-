<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Inbox | Pits Stop Collectibles</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: white; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #111; padding: 30px; border-radius: 15px; border: 1px solid #e60000; }
        h1 { font-family: 'Orbitron'; color: #e60000; text-align: center; }
        .msg-card { background: #1a1a1a; border-left: 4px solid #e60000; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
        .msg-header { display: flex; justify-content: space-between; font-size: 0.8rem; color: #888; margin-bottom: 10px; }
        .admin-reply { margin-top: 15px; padding-top: 10px; border-top: 1px dashed #444; color: #00ff00; }
        .no-msg { text-align: center; color: #555; padding: 40px; }
        .back-btn { display: inline-block; color: #e60000; text-decoration: none; margin-bottom: 20px; font-family: 'Orbitron'; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← Back to Shop</a>
    <h1>MY MESSAGES</h1>
    <div id="messageList"></div>
</div>

<script>
    window.onload = function() {
        // LOGIN PROTECTION
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || localStorage.getItem('loggedIn') !== 'true') {
            alert("Please login to view your inbox.");
            window.location.href = 'login.html';
            return;
        }

        const inbox = JSON.parse(localStorage.getItem('adminInbox')) || [];
        const messageList = document.getElementById('messageList');
        
        // Filter messages para sa naka-login na user lang
        const myMessages = inbox.filter(m => m.username === currentUser.username);

        if (myMessages.length === 0) {
            messageList.innerHTML = '<div class="no-msg">No messages yet. Contact us if you have questions!</div>';
        } else {
            myMessages.forEach(msg => {
                messageList.innerHTML += `
                    <div class="msg-card">
                        <div class="msg-header">
                            <span>Subject: <strong>${msg.subject}</strong></span>
                            <span>${msg.date}</span>
                        </div>
                        <p style="margin:0;">Me: ${msg.message}</p>
                        ${msg.reply ? `
                            <div class="admin-reply">
                                <strong>Admin Response:</strong><br>
                                ${msg.reply}
                            </div>
                        ` : `
                            <div style="color:#555; font-size:0.75rem; margin-top:10px;">Waiting for admin response...</div>
                        `}
                    </div>
                `;
            });
        }
    };
</script>
</body>
</html>
