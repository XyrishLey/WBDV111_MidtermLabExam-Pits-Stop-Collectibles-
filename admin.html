<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Pits Stop Collectibles</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: white; padding: 20px; }
        h1, h2 { font-family: 'Orbitron', sans-serif; color: #e60000; text-align: center; }
        h2 { text-align: left; font-size: 1.1rem; margin-top: 40px; border-left: 5px solid #e60000; padding-left: 15px; text-transform: uppercase; }
        
        .admin-container { max-width: 1100px; margin: 0 auto; background: rgba(20, 20, 20, 0.9); padding: 30px; border-radius: 15px; border: 1px solid #e60000; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #111; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; font-size: 0.85rem; }
        th { background: #e60000; color: white; font-family: 'Orbitron', sans-serif; font-size: 0.7rem; }
        tr:hover { background: #1a1a1a; }
        
        .btn { border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; font-family: 'Orbitron', sans-serif; transition: 0.3s; text-transform: uppercase; }
        .delete-btn { background: #444; color: white; }
        .delete-btn:hover { background: #e60000; }
        .approve-btn { background: #008000; color: white; margin-right: 5px; }
        .approve-btn:hover { background: #00ff00; color: black; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; }
        .status-pending { background: #856404; color: #fff; }
        .status-completed { background: #155724; color: #fff; }

        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #111; padding: 20px; border-radius: 10px; border-bottom: 4px solid #e60000; flex: 1; text-align: center; }
        .stat-card h3 { font-size: 0.65rem; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .stat-card p { font-size: 1.5rem; font-weight: bold; font-family: 'Orbitron', sans-serif; margin: 0; }

        .logout-link { display: block; text-align: right; color: #888; text-decoration: none; font-size: 0.8rem; margin-bottom: 10px; cursor: pointer; }
        .logout-link:hover { color: #e60000; }
    </style>
</head>
<body>

    <div class="admin-container">
        <span class="logout-link" onclick="logoutAdmin()">Logout Admin</span>
        <h1>ADMIN CONTROL PANEL</h1>

        <div class="stats">
            <div class="stat-card">
                <h3>Pending Orders</h3>
                <p id="pendingCount">0</p>
            </div>
            <div class="stat-card">
                <h3>Total Sales</h3>
                <p id="totalSales">₱0</p>
            </div>
            <div class="stat-card">
                <h3>Registered Users</h3>
                <p id="userCount">0</p>
            </div>
        </div>

        <h2>Order Requests (Verification Needed)</h2>
        <table>
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Total</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="orderTableBody"></tbody>
        </table>

        <h2>Customer Inbox (Inquiries)</h2>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Sender</th>
                    <th>Subject</th>
                    <th>Message</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="inboxTableBody"></tbody>
        </table>

        <h2>Registered Accounts</h2>
        <table>
            <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Username</th>
                    <th>Contact</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>
    </div>

    <script>
        // 1. SECURITY & AUTH
        function checkAuth() {
            if (localStorage.getItem('isAdmin') !== 'true') {
                window.location.replace('index.html');
            }
        }

        function logoutAdmin() {
            localStorage.removeItem('isAdmin');
            window.location.replace('index.html');
        }

        window.addEventListener('pageshow', function(event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                checkAuth();
            }
        });

        window.onload = function() {
            checkAuth();
            loadDashboard();
        };

        function loadDashboard() {
            loadUsers();
            loadOrders();
            loadInbox();
        }

        // 2. DATA LOADING FUNCTIONS
        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('allUsers')) || [];
            const singleUser = JSON.parse(localStorage.getItem('user')); 
            const tableBody = document.getElementById('userTableBody');
            const userCountDisplay = document.getElementById('userCount');
            tableBody.innerHTML = "";

            let allRegistered = [...users];
            if (singleUser && !allRegistered.find(u => u.username === singleUser.username)) {
                allRegistered.push(singleUser);
            }

            if (allRegistered.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No users found.</td></tr>';
            } else {
                allRegistered.forEach((u) => {
                    tableBody.innerHTML += `
                        <tr>
                            <td>${u.fullname || 'N/A'}</td>
                            <td>${u.username}</td>
                            <td>${u.contact || 'N/A'}</td>
                            <td><button class="btn delete-btn" onclick="deleteUser('${u.username}')">Delete</button></td>
                        </tr>`;
                });
            }
            userCountDisplay.innerText = allRegistered.length;
        }

        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('allOrders')) || [];
            const tableBody = document.getElementById('orderTableBody');
            const pendingDisplay = document.getElementById('pendingCount');
            const salesDisplay = document.getElementById('totalSales');
            tableBody.innerHTML = "";
            
            let pendingCount = 0;
            let totalSales = 0;

            if (orders.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No orders yet.</td></tr>';
            } else {
                orders.forEach((order, index) => {
                    if (order.status === "Pending") pendingCount++;
                    if (order.status === "Completed") {
                        totalSales += parseInt(order.total.toString().replace(/,/g, ''));
                    }
                    tableBody.innerHTML += `
                        <tr>
                            <td>${order.orderID}</td>
                            <td>${order.user}</td>
                            <td>₱${order.total}</td>
                            <td>${order.date}</td>
                            <td><span class="status-badge ${order.status === 'Pending' ? 'status-pending' : 'status-completed'}">${order.status}</span></td>
                            <td>
                                ${order.status === 'Pending' ? `<button class="btn approve-btn" onclick="approveOrder(${index})">Approve</button>` : ''}
                                <button class="btn delete-btn" onclick="deleteOrder(${index})">Remove</button>
                            </td>
                        </tr>`;
                });
            }
            pendingDisplay.innerText = pendingCount;
            salesDisplay.innerText = "₱" + totalSales.toLocaleString();
        }

        function loadInbox() {
    const inbox = JSON.parse(localStorage.getItem('adminInbox')) || [];
    const tableBody = document.getElementById('inboxTableBody');
    tableBody.innerHTML = "";

    if (inbox.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No messages.</td></tr>';
    } else {
        inbox.forEach((msg, index) => {
            tableBody.innerHTML += `
                <tr>
                    <td>${msg.date}</td>
                    <td><strong>${msg.sender}</strong> (${msg.username})</td>
                    <td>${msg.subject}</td>
                    <td>${msg.message} ${msg.reply ? `<br><i style="color:#00ff00;">Replied: ${msg.reply}</i>` : ''}</td>
                    <td>
                        <button class="btn approve-btn" onclick="replyMessage(${index})">Reply</button>
                        <button class="btn delete-btn" onclick="deleteMessage(${index})">Clear</button>
                    </td>
                </tr>`;
        });
    }
}

function replyMessage(index) {
    const inbox = JSON.parse(localStorage.getItem('adminInbox'));
    const replyText = prompt("Enter your reply for " + inbox[index].sender + ":");
    
    if (replyText) {
        inbox[index].reply = replyText; // Dagdag reply field
        localStorage.setItem('adminInbox', JSON.stringify(inbox));
        alert("Reply sent!");
        loadInbox();
    }
}
        // 3. ACTION FUNCTIONS
        function approveOrder(index) {
            let orders = JSON.parse(localStorage.getItem('allOrders'));
            orders[index].status = "Completed";
            localStorage.setItem('allOrders', JSON.stringify(orders));
            loadOrders();
        }

        function deleteOrder(index) {
            if (confirm("Delete this order?")) {
                let orders = JSON.parse(localStorage.getItem('allOrders'));
                orders.splice(index, 1);
                localStorage.setItem('allOrders', JSON.stringify(orders));
                loadOrders();
            }
        }

        function deleteMessage(index) {
            let inbox = JSON.parse(localStorage.getItem('adminInbox'));
            inbox.splice(index, 1);
            localStorage.setItem('adminInbox', JSON.stringify(inbox));
            loadInbox();
        }

        function deleteUser(username) {
            if (confirm("Delete this user?")) {
                let users = JSON.parse(localStorage.getItem('allUsers')) || [];
                users = users.filter(u => u.username !== username);
                localStorage.setItem('allUsers', JSON.stringify(users));
                
                let singleUser = JSON.parse(localStorage.getItem('user'));
                if(singleUser && singleUser.username === username) {
                    localStorage.removeItem('user');
                }
                loadUsers();
            }
        }
    </script>
</body>
</html>
