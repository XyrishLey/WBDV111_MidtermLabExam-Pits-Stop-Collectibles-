<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Pits Stop Collectibles</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .contact-container { width: 100%; max-width: 500px; background: rgba(20, 20, 20, 0.95); padding: 40px; border-radius: 15px; border: 1px solid #e60000; box-shadow: 0 0 20px rgba(230, 0, 0, 0.2); }
        h1 { font-family: 'Orbitron', sans-serif; color: #e60000; text-align: center; margin-bottom: 10px; }
        p { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; color: #e60000; text-transform: uppercase; font-family: 'Orbitron'; margin-bottom: 8px; }
        input, textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; outline: none; }
        input:focus, textarea:focus { border-color: #e60000; }
        
        .submit-btn { width: 100%; padding: 15px; background: #e60000; color: white; border: none; border-radius: 5px; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: #ff1a1a; transform: translateY(-2px); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="contact-container">
    <h1>CONTACT STAFF</h1>
    <p>Need help with your collectibles? Send us a message.</p>
    
    <div class="form-group">
        <label>Subject</label>
        <input type="text" id="subject" placeholder="e.g. Order Status, Item Inquiry">
    </div>

    <div class="form-group">
        <label>Message</label>
        <textarea id="message" rows="5" placeholder="Write your message here..."></textarea>
    </div>

    <button class="submit-btn" onclick="sendToAdmin()">SEND MESSAGE</button>
    <a href="index.html" class="back-link">← Return to Shop</a>
</div>

<script>
    function sendToAdmin() {
    const subject = document.getElementById('subject').value.trim();
    const content = document.getElementById('message').value.trim();
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));

    if (!currentUser) {
        alert("Please login first before sending a message.");
        window.location.href = 'login.html';
        return;
    }

    if (!subject || !content) {
        alert("Please fill in all fields.");
        return;
    }

    const newMessage = {
        sender: currentUser.fullname,
        username: currentUser.username, // IMPORTANTE: Para sa filter ng Inbox
        subject: subject,
        message: content,
        date: new Date().toLocaleString(),
        reply: null // Empty reply at first
    };

    let inbox = JSON.parse(localStorage.getItem('adminInbox')) || [];
    inbox.push(newMessage);
    localStorage.setItem('adminInbox', JSON.stringify(inbox));

    alert("Message sent! Check your Inbox page for our response later.");
    window.location.href = 'index.html';
}   
</script>

</body>
</html>
