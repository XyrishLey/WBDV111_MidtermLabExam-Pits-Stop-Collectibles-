<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Pits Stops Collectibles</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/XyrishLey/Pits-Stops-Collectibles-Website/refs/heads/main/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .product-container {
            display: flex;
            max-width: 1200px;
            margin: 120px auto 50px;
            padding: 40px;
            gap: 50px;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 20px;
            color: white;
            border: 1px solid #333;
        }

        .product-image-side {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .product-image-side img {
            width: 100%;
            max-width: 450px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(230, 0, 0, 0.4);
            border: 2px solid #444;
        }

        .product-info-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .product-info-side h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .product-info-side .price {
            font-size: 2.2rem;
            color: #e60000;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .description {
            font-family: 'Inter', sans-serif;
            line-height: 1.8;
            color: #bbb;
            margin-bottom: 30px;
        }

        .purchase-actions {
            display: flex;
            gap: 20px;
        }

        .wishlist-btn {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
        }

        .wishlist-btn:hover {
            background: #333;
        }

        @media (max-width: 768px) {
            .product-container {
                flex-direction: column;
                margin: 80px 20px;
                padding: 20px;
                text-align: center;
            }
            .purchase-actions {
                flex-direction: column;
            }
            .product-image-side img {
                max-width: 100%;
            }
        }
    </style>
</head>
<body class="product-page">
    <header>
        <nav class="nav-bar">
            <a href="index.html" class="nav-logo">
                <h2 class="logo-text">Pits Stops Collectibles</h2>
            </a>
            <div class="menu-toggle" onclick="toggleMenu()">☰</div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-button">Home</a></li>
                <li class="nav-item dropdown">
                    <a href="#" class="nav-button">Brands ▾</a>
                    <ul class="dropdown-menu">
                        <li><a href="hotwheels.html" class="nav-button">Hotwheels</a></li>
                        <li><a href="premium.html" class="nav-button">Hotwheels Premium</a></li>
                        <li><a href="matchbox.html" class="nav-button">Matchbox</a></li>
                    </ul>
                </li>
                <li class="nav-item"><a href="aboutUs.html" class="nav-button">About Us</a></li>
                <li class="nav-item">
        <a href="cart.html" class="nav-button">
            🛒 Cart <span id="cart-count" style="background: #e60000; color: white; border-radius: 50%; padding: 2px 8px; font-size: 12px; margin-left: 5px; display: none;">0</span>
        </a>
            </ul>
        </nav>
    </header>

    <section class="product-container">
        <div class="product-image-side">
            <img id="product-img" src="" alt="Product Image">
        </div>
        <div class="product-info-side">
            <h1 id="product-name">Loading...</h1>
            <p class="price" id="product-price"></p>
            <p class="description">
                Official diecast collectible. High-quality build with authentic detailing. 
                A must-have for any serious car enthusiast or collector.
            </p>
            
            <div class="purchase-actions">
                <button class="cta-button" onclick="addToCart()">ADD TO CART</button>
                <button class="wishlist-btn">WISHLIST</button>
            </div>
        </div>
    </section>

    <script>
        function toggleMenu() {
            const menu = document.querySelector('.nav-menu');
            menu.classList.toggle('active');
        }

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const name = params.get('name');
            const price = params.get('price');
            const img = params.get('img');

            if (name) document.getElementById('product-name').innerText = name;
            if (price) document.getElementById('product-price').innerText = "₱" + price;
            if (img) document.getElementById('product-img').src = img;
        };

       function addToCart() {
    const params = new URLSearchParams(window.location.search);
    const item = {
        name: params.get('name'),
        price: params.get('price'),
        img: params.get('img')
    };

    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    cart.push(item);
    localStorage.setItem('cart', JSON.stringify(cart));
    
    alert(item.name + ' added to cart!');
    window.location.href = 'cart.html'; 


       }
    </script>
</body>
</html>
